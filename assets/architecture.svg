<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img">
<title>Hybrid RAG Banking Compliance Assistant Architecture</title>
<desc>Two-pipeline architecture: a document ingestion and indexing pipeline builds FAISS and BM25 indexes from banking PDFs using Azure OpenAI embeddings; a retrieval and generation pipeline processes a user question through hybrid retrieval (BM25, FAISS, reciprocal rank fusion), maximal marginal relevance to reduce redundant chunks, cross-encoder reranking, and Azure OpenAI GPT-5 mini generation. A separate Ragas evaluation pipeline reports Faithfulness 1.0, Context Precision 1.0, and Answer Relevancy 0.81, judged independently by Llama 3.3 70B via Groq.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5b6472" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrowBold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#0f6e56" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1f2937" flood-opacity="0.10"/>
</filter>
</defs>
<style>
.bg{fill:#f5f7fa;}
.panel{fill:#ffffff;stroke:#e2e6ec;stroke-width:1;filter:url(#cardShadow);}
.paneltitle{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#1f2937;}
.title{font:700 30px 'Segoe UI',Arial,sans-serif;fill:#111827;text-anchor:middle;}
.subtitle{font:400 15px 'Segoe UI',Arial,sans-serif;fill:#6b7280;text-anchor:middle;}
.card{stroke-width:1;filter:url(#cardShadow);}
.cardTitle{font:600 15px 'Segoe UI',Arial,sans-serif;}
.cardSub{font:400 12.5px 'Segoe UI',Arial,sans-serif;}
.arr{stroke:#5b6472;stroke-width:1.8;fill:none;}
.blue{fill:#eef4fd;stroke:#bcd6f7;}
.blueTxt{fill:#1d4e89;}
.blueSub{fill:#3f6ea5;}
.teal{fill:#eafaf5;stroke:#b7ebda;}
.tealTxt{fill:#0f6e56;}
.tealSub{fill:#2c8a6e;}
.purple{fill:#f2f0ff;stroke:#d6d0fb;}
.purpleTxt{fill:#4a3f9e;}
.purpleSub{fill:#6a5fc0;}
.coral{fill:#fdf0ec;stroke:#f6cdbc;}
.coralTxt{fill:#a03d1d;}
.coralSub{fill:#c15a34;}
.evalpanel{fill:#fbf9ff;stroke:#e6ddfb;stroke-width:1.2;filter:url(#cardShadow);}
.statnum{font:700 34px 'Segoe UI',Arial,sans-serif;text-anchor:middle;}
.statlabel{font:500 13.5px 'Segoe UI',Arial,sans-serif;text-anchor:middle;fill:#4b5563;}
.footer{font:400 13px 'Segoe UI',Arial,sans-serif;fill:#9199a6;text-anchor:middle;}
.bubble{fill:#ffffff;stroke:#bcd6f7;stroke-width:1.2;}
.bubbleTxt{font:500 12.5px 'Segoe UI',Arial,sans-serif;fill:#1d4e89;text-anchor:middle;}
</style>

<rect class="bg" x="0" y="0" width="1200" height="900"/>

<text class="title" x="600" y="46">Hybrid RAG Banking Compliance Assistant Architecture</text>
<text class="subtitle" x="600" y="72">Dense + sparse retrieval, reranking, and independent Ragas evaluation</text>

<!-- Left panel: Document Ingestion & Indexing Pipeline -->
<rect class="panel" x="40" y="90" width="550" height="520" rx="18"/>
<text class="paneltitle" x="70" y="128">Document ingestion &amp; indexing pipeline</text>

<g>
<rect class="card blue" x="70" y="150" width="490" height="70" rx="12"/>
<text class="cardTitle blueTxt" x="315" y="188" text-anchor="middle" dominant-baseline="central">Banking PDFs</text>
</g>

<g>
<rect class="card blue" x="70" y="250" width="490" height="80" rx="12"/>
<text class="cardTitle blueTxt" x="315" y="278" text-anchor="middle" dominant-baseline="central">Chunking &amp; metadata tagging</text>
<text class="cardSub blueSub" x="315" y="300" text-anchor="middle" dominant-baseline="central">Recursive splitter, per-document tags</text>
</g>

<g>
<rect class="card coral" x="70" y="360" width="490" height="80" rx="12"/>
<text class="cardTitle coralTxt" x="315" y="388" text-anchor="middle" dominant-baseline="central">Azure OpenAI – text-embedding-3-small</text>
<text class="cardSub coralSub" x="315" y="410" text-anchor="middle" dominant-baseline="central">Disk-cached embeddings</text>
</g>

<g>
<rect class="card teal" x="70" y="470" width="490" height="70" rx="12"/>
<text class="cardTitle tealTxt" x="315" y="508" text-anchor="middle" dominant-baseline="central">FAISS + BM25 indexes</text>
</g>

<line x1="315" y1="220" x2="315" y2="248" class="arr" marker-end="url(#arrow)"/>
<line x1="315" y1="330" x2="315" y2="358" class="arr" marker-end="url(#arrow)"/>
<line x1="315" y1="440" x2="315" y2="468" class="arr" marker-end="url(#arrow)"/>

<!-- Right panel: Retrieval & Generation Pipeline -->
<rect class="panel" x="610" y="90" width="550" height="520" rx="18"/>
<text class="paneltitle" x="640" y="128">Retrieval &amp; generation pipeline</text>

<!-- User question speech bubble -->
<g>
<path class="bubble" d="M812 138 h146 a10 10 0 0 1 10 10 v14 a10 10 0 0 1 -10 10 h-63 l-10 12 l-4 -12 h-69 a10 10 0 0 1 -10 -10 v-14 a10 10 0 0 1 10 -10 Z"/>
<text class="bubbleTxt" x="885" y="160" text-anchor="middle" dominant-baseline="central">User question</text>
</g>

<g>
<rect class="card blue" x="640" y="180" width="490" height="60" rx="12"/>
<text class="cardTitle blueTxt" x="885" y="210" text-anchor="middle" dominant-baseline="central">Query processing</text>
</g>

<g>
<rect class="card teal" x="640" y="260" width="490" height="64" rx="12"/>
<text class="cardTitle tealTxt" x="885" y="284" text-anchor="middle" dominant-baseline="central">Hybrid retrieval</text>
<text class="cardSub tealSub" x="885" y="303" text-anchor="middle" dominant-baseline="central">BM25 + FAISS + reciprocal rank fusion (RRF)</text>
</g>

<g>
<rect class="card teal" x="640" y="344" width="490" height="56" rx="12"/>
<text class="cardTitle tealTxt" x="885" y="365" text-anchor="middle" dominant-baseline="central">MMR</text>
<text class="cardSub tealSub" x="885" y="383" text-anchor="middle" dominant-baseline="central">Reduces redundant chunks</text>
</g>

<g>
<rect class="card purple" x="640" y="420" width="490" height="70" rx="12"/>
<text class="cardTitle purpleTxt" x="885" y="448" text-anchor="middle" dominant-baseline="central">Cross-encoder reranking</text>
<text class="cardSub purpleSub" x="885" y="468" text-anchor="middle" dominant-baseline="central">BAAI/bge-reranker-v2-m3</text>
</g>

<g>
<rect class="card coral" x="640" y="510" width="490" height="64" rx="12"/>
<text class="cardTitle coralTxt" x="885" y="536" text-anchor="middle" dominant-baseline="central">Azure OpenAI – GPT-5 mini</text>
<text class="cardSub coralSub" x="885" y="555" text-anchor="middle" dominant-baseline="central">Grounded answer + sources</text>
</g>

<line x1="885" y1="172" x2="885" y2="178" class="arr" marker-end="url(#arrow)"/>
<line x1="885" y1="240" x2="885" y2="258" class="arr" marker-end="url(#arrow)"/>
<line x1="885" y1="324" x2="885" y2="342" class="arr" marker-end="url(#arrow)"/>
<line x1="885" y1="400" x2="885" y2="418" class="arr" marker-end="url(#arrow)"/>
<line x1="885" y1="490" x2="885" y2="508" class="arr" marker-end="url(#arrow)"/>

<!-- Cross-panel connector: indexes feed hybrid retrieval — bolded per feedback -->
<path d="M560 505 L604 505 L604 292 L638 292" fill="none" stroke="#0f6e56" stroke-width="2.6" marker-end="url(#arrowBold)"/>

<!-- Ragas Evaluation Pipeline — visually separate -->
<rect class="evalpanel" x="40" y="640" width="1120" height="220" rx="18"/>
<text class="paneltitle" x="70" y="678" fill="#4a3f9e">Ragas evaluation pipeline</text>
<text class="cardSub" x="70" y="700" fill="#6a5fc0">Judged by Llama 3.3 70B (Groq) — independent from the pipeline's Azure OpenAI model</text>

<g>
<rect class="card purple" x="70" y="720" width="340" height="110" rx="14"/>
<text class="statnum purpleTxt" x="240" y="765">1.00</text>
<text class="statlabel" x="240" y="800">Faithfulness</text>
</g>

<g>
<rect class="card purple" x="430" y="720" width="340" height="110" rx="14"/>
<text class="statnum purpleTxt" x="600" y="765">1.00</text>
<text class="statlabel" x="600" y="800">Context precision</text>
</g>

<g>
<rect class="card purple" x="790" y="720" width="340" height="110" rx="14"/>
<text class="statnum purpleTxt" x="960" y="765">0.81</text>
<text class="statlabel" x="960" y="800">Answer relevancy</text>
</g>

<text class="footer" x="600" y="882">Built with LangChain · Azure OpenAI · FAISS · BM25 · Ragas</text>

</svg>
